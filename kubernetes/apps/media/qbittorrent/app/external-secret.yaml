# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
#
# Fetches VPN credentials from 1Password for gluetun (Mullvad WireGuard).
#
# 1Password item: "qbittorrent-vpn"
# Required fields:
#   - vpn_service_provider: "mullvad"
#   - wireguard_private_key: WireGuard private key from Mullvad
#   - wireguard_addresses: WireGuard address (e.g., "10.x.x.x/32")
#   - server_countries: e.g., "Sweden" or "Netherlands"
#
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: qbittorrent-vpn
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: qbittorrent-vpn
    template:
      engineVersion: v2
      data:
        VPN_SERVICE_PROVIDER: "{{ .vpn_service_provider }}"
        WIREGUARD_PRIVATE_KEY: "{{ .wireguard_private_key }}"
        WIREGUARD_ADDRESSES: "{{ .wireguard_addresses }}"
        SERVER_COUNTRIES: "{{ .server_countries }}"
  data:
    - secretKey: vpn_service_provider
      remoteRef:
        key: qbittorrent-vpn
        property: vpn_service_provider
    - secretKey: wireguard_private_key
      remoteRef:
        key: qbittorrent-vpn
        property: wireguard_private_key
    - secretKey: wireguard_addresses
      remoteRef:
        key: qbittorrent-vpn
        property: wireguard_addresses
    - secretKey: server_countries
      remoteRef:
        key: qbittorrent-vpn
        property: server_countries
